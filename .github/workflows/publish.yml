name: Publish (PyPI)

# Build the ggplotpy sdist+wheel and publish to PyPI on a version tag.
# Uses PyPI Trusted Publishing (OIDC) — no API token/secret required once the
# project is configured at https://pypi.org/manage/account/publishing/ for this
# repo + workflow.  Tag a release:  git tag ggplotpy-v0.1.0 && git push --tags

on:
  push:
    tags:
      - "ggplotpy-v*"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  pypi:
    needs: build
    runs-on: ubuntu-latest
    # Trusted Publishing: requires this environment + OIDC permission.
    environment:
      name: pypi
      url: https://pypi.org/p/ggplotpy
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
