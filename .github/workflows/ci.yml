name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test-fast:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"

      - name: Install R packages
        shell: bash
        run: |
          Rscript -e 'install.packages(c("ggplot2", "rlang", "svglite"), repos="https://cloud.r-project.org")'
          Rscript -e 'install.packages("r-helper/ggplotpy", repos=NULL, type="source")'

      - name: Install ggplotpy (dev)
        run: pip install -e ".[dev]"

      - name: Unit tests (T0, skip heavy collection)
        env:
          GGPLOTPY_SKIP_NOTEBOOKS: "1"
          GGPLOTPY_SKIP_INTEGRATION: "1"
        run: pytest tests/unit -q

  test-integration:
    needs: test-fast
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"

      - name: Install R packages
        shell: bash
        run: |
          Rscript -e 'install.packages(c("ggplot2", "rlang", "svglite"), repos="https://cloud.r-project.org")'
          Rscript -e 'install.packages("r-helper/ggplotpy", repos=NULL, type="source")'

      - name: Install ggplotpy (dev)
        run: pip install -e ".[dev]"

      - name: Integration tests (T1, OOM-safe subprocess per file)
        env:
          GGPLOTPY_SKIP_NOTEBOOKS: "1"
        shell: pwsh
        run: ./scripts/run_tests.ps1 -Tier tier1

      - name: Edge matrix (T2, OOM-safe subprocess per file)
        env:
          GGPLOTPY_SKIP_NOTEBOOKS: "1"
        shell: pwsh
        run: ./scripts/run_tests.ps1 -Tier tier2
